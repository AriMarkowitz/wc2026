name: Fetch WC 2026 Data

on:
  schedule:
    # Run at 08:00 and 20:00 UTC daily (covers European evening + US daytime)
    - cron: "0 8 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest WC data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wc2026.json data/player_profiles.json web/data/wc2026.json
          git diff --staged --quiet || git commit -m "chore: update WC 2026 data [skip ci]"
          git push
