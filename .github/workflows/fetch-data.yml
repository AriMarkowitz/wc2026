name: Fetch WC 2026 Data

on:
  schedule:
    # Runs 150 min (2h30m) after each distinct WC 2026 kickoff slot (UTC).
    # Kickoff times sourced from ESPN API across the full tournament schedule.
    - cron: "30 0  * * *"  # kickoff 22:00 UTC (9 matches)
    - cron: "30 1  * * *"  # kickoff 23:00 UTC (6 matches)
    - cron: "0  2  * * *"  # kickoff 23:30 UTC (2 matches)
    - cron: "30 2  * * *"  # kickoff 00:00 UTC (7 matches)
    - cron: "0  3  * * *"  # kickoff 00:30 UTC (1 match)
    - cron: "30 3  * * *"  # kickoff 01:00 UTC (11 matches)
    - cron: "0  4  * * *"  # kickoff 01:30 UTC (1 match)
    - cron: "30 4  * * *"  # kickoff 02:00 UTC (8 matches)
    - cron: "30 5  * * *"  # kickoff 03:00 UTC (5 matches)
    - cron: "30 6  * * *"  # kickoff 04:00 UTC (3 matches)
    - cron: "30 18 * * *"  # kickoff 16:00 UTC (5 matches)
    - cron: "30 19 * * *"  # kickoff 17:00 UTC (8 matches)
    - cron: "30 20 * * *"  # kickoff 18:00 UTC (1 match)
    - cron: "30 21 * * *"  # kickoff 19:00 UTC (18 matches — most common)
    - cron: "30 22 * * *"  # kickoff 20:00 UTC (10 matches)
    - cron: "0  23 * * *"  # kickoff 20:30 UTC (1 match)
    - cron: "30 23 * * *"  # kickoff 21:00 UTC (7 matches)
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest WC data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wc2026.json data/player_profiles.json web/data/wc2026.json
          git diff --staged --quiet || git commit -m "chore: update WC 2026 data [skip ci]"
          git pull --rebase origin master
          git push origin master
