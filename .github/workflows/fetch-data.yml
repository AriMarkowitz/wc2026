name: Fetch WC 2026 Data

on:
  schedule:
    # WC 2026 kickoffs cluster around 16:00–23:30 UTC.
    # Running 3h after the latest possible last match of each window:
    - cron: "0 1  * * *"  # covers last kickoffs at 22:00 UTC (most common)
    - cron: "30 2 * * *"  # covers last kickoffs at 23:00–23:30 UTC
    - cron: "30 4 * * *"  # covers very late kickoffs (00:00–01:30 UTC next day)
    - cron: "0 19 * * *"  # covers early afternoon kickoffs (16:00 UTC)
    - cron: "0 23 * * *"  # covers early evening kickoffs (19:00–20:00 UTC)
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest WC data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wc2026.json data/player_profiles.json web/data/wc2026.json
          git diff --staged --quiet || git commit -m "chore: update WC 2026 data [skip ci]"
          git pull --rebase origin master
          git push origin master
